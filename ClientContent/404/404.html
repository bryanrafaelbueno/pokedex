<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pokédex - Página não encontrada">
    <title>404 - Pokémon não encontrado</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="404.css">
</head>

<body>

    <div class="particles" aria-hidden="true">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <div class="container">
        <div class="content">
            <div class="error-section">
                <img id="pokemon-left" src="https://i.imgur.com/6FO8mqT.png" alt="Pokemon" class="pokemon pokemon-left">
                <div class="error-code-wrapper">
                    <div class="error-code" data-text="404">404</div>
                    <div class="error-code-shadow">404</div>
                </div>
                <img id="pokemon-right" src="https://i.imgur.com/6FO8mqT.png" alt="Pokemon"
                    class="pokemon pokemon-right">
            </div>

            <h1>Pokémon não encontrado!</h1>
            <p id="random-phrase" class="error-message">Desculpa, a página que você procura não existe ou foi movida.
            </p>

            <a href="/" class="btn">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                Voltar para a Pokédex
            </a>

        </div>
    </div>

    <audio id="bg-music" loop muted style="display: none;">
        <source src="404.mp3" type="audio/mpeg">
    </audio>

    <script>
        const phrases = [
            "A página que você procura fugiu mais rápido que um Pidgey selvagem na primeira batalha!",
            "A página que você procura se escondeu melhor que um Ditto em batalha!",
            "Parece que a página fugiu como um Abra usando Teletransporte!",
            "Ela se perdeu na rota 404 e só um Snorlax poderia bloquear o caminho!",
            "A página que você procura escapou mais rápido que um Quick Attack de Jolteon!",
            "A página que você procura não aparece. Talvez um Diglett esteja cavando debaixo dela!"
        ];

        const pokemonImages = [
            "https://i.imgur.com/6FO8mqT.png", // Sad Bulbasaur
            "https://i.imgur.com/1uZe8NY.png"  // Pikachu
        ];

        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('random-phrase').textContent = randomPhrase;

        // Randomly choose between Bulbasaurs or Pikachus
        const leftPokemon = document.getElementById('pokemon-left');
        const rightPokemon = document.getElementById('pokemon-right');

        const pokemonChoice = Math.floor(Math.random() * 2);
        const chosenImage = pokemonImages[pokemonChoice];

        leftPokemon.src = chosenImage;
        rightPokemon.src = chosenImage;

        if (chosenImage.includes('6FO8mqT')) {
            leftPokemon.style.transform = 'scaleX(-1)';
            rightPokemon.style.transform = 'scaleX(1)';
            leftPokemon.alt = 'Sad Bulbasaur';
            rightPokemon.alt = 'Sad Bulbasaur';
        } else {
            leftPokemon.style.transform = 'scaleX(1)';
            rightPokemon.style.transform = 'scaleX(-1)';
            leftPokemon.alt = 'Pikachu';
            rightPokemon.alt = 'Pikachu';
        }

        // Play background music on first click
        const audio = document.getElementById('bg-music');
        let musicStarted = false;

        document.addEventListener('click', function () {
            if (!musicStarted && audio) {
                audio.volume = 0.2;
                audio.muted = false;
                audio.play().catch(function (error) {
                    console.log('Audio play failed:', error);
                });
                musicStarted = true;
            }
        });
    </script>

</body>

</html>
